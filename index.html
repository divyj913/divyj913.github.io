<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divy Jain — Undergoing Maintenance</title>
  <link rel="icon" href="DJ.jpeg" type="image/jpeg" />
  <script>
    (function () {
      const savedTheme = localStorage.getItem('divy-theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- NAV -->
  <nav style="justify-content: space-between;">
    <a href="#" class="nav-logo" style="pointer-events: none;">Divy <span>Jain</span></a>
    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
      <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </nav>

  <!-- HERO/MAINTENANCE -->
  <section class="hero" id="home">
    <div class="hero-bg">
      <canvas class="hero-canvas" id="heroCanvas"></canvas>
      <div class="hero-vignette"></div>
      <div class="hero-noise"></div>
    </div>
    
    <div class="hero-content" style="z-index: 10;">
      <div class="bracket-card reveal visible" style="padding: 4rem 3rem; background: var(--c-bg2); border: 1px solid var(--c-line2); border-radius: 8px; max-width: 600px; margin: 0 auto;">
        <div class="bracket-card-inner">
          <div class="hero-eyebrow" style="margin-bottom: 1rem;">System Update</div>
          <h1 style="font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem); font-weight: 400; margin-bottom: 1.5rem; line-height: 1.2;">
            Temporarily <br><em>Offline</em>
          </h1>
          <p style="font-family: var(--sans); font-size: 1.05rem; color: var(--c-muted); line-height: 1.7; margin-bottom: 2rem;">
            We're updating the Founder Content Engine™ portal. We will return shortly with enhanced performance and features.
          </p>
          
          <div style="font-family: var(--mono); font-size: 0.85rem; border-top: 1px solid var(--c-line2); padding-top: 1.5rem; margin-top: 1.5rem;">
            <p style="margin-bottom: 0.75rem; color: var(--c-text);">Connect with us:</p>
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
              <a href="https://www.linkedin.com/in/divyj913" target="_blank" style="color: var(--c-muted); text-decoration: none; transition: color 0.2s;">LinkedIn</a>
              <a href="https://instagram.com/jn.divy" target="_blank" style="color: var(--c-muted); text-decoration: none; transition: color 0.2s;">Instagram</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="scripts.js"></script>
</body>
</html>
