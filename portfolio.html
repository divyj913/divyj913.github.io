  <script type="text/babel">
    const { useRef, useEffect, useState, useCallback } = React;

    // FadingVideo Component
    const FadingVideo = ({ src, className, style }) => {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = useCallback((target, duration) => {
        if (rafRef.current) {
          cancelAnimationFrame(rafRef.current);
        }
        
        const video = videoRef.current;
        if (!video) return;

        let startOpacity = parseFloat(video.style.opacity);
        if (isNaN(startOpacity)) {
          startOpacity = 0;
        }

        const startTime = performance.now();

        const animate = (currentTime) => {
          const v = videoRef.current;
          if (!v) return;

          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const current = startOpacity + (target - startOpacity) * progress;
          v.style.opacity = current;

          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          }
        };

        rafRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        video.style.opacity = '0';

        const handleLoadedData = () => {
          video.style.opacity = '0';
          video.play().catch(err => console.log("Play blocked/interrupted:", err));
          fadeTo(1, 500);
        };

        const handleTimeUpdate = () => {
          const duration = video.duration;
          const currentTime = video.currentTime;
          if (!duration || isNaN(duration)) return;

          const timeLeft = duration - currentTime;
          if (!fadingOutRef.current && timeLeft <= 0.55 && timeLeft > 0) {
            fadingOutRef.current = true;
            fadeTo(0, 500);
          }
        };

        const handleEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            const v = videoRef.current;
            if (!v) return;
            v.currentTime = 0;
            v.play().catch(err => console.log("Play blocked/interrupted:", err));
            fadingOutRef.current = false;
            fadeTo(1, 500);
          }, 100);
        };

        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        if (video.readyState >= 2) {
          handleLoadedData();
        }

        return () => {
          if (rafRef.current) {
            cancelAnimationFrame(rafRef.current);
          }
          video.removeEventListener('loadeddata', handleLoadedData);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, [src, fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ ...style, opacity: 0 }}
          muted
          autoPlay
          playsInline
          preload="auto"
        />
      );
    };
    window.FadingVideo = FadingVideo;

    // BlurText Component
    const BlurText = ({ text, className }) => {
      const containerRef = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsInView(true);
            }
          },
          { threshold: 0.1 }
        );

        if (containerRef.current) {
          observer.observe(containerRef.current);
        }

        return () => {
          if (containerRef.current) {
            observer.unobserve(containerRef.current);
          }
        };
      }, []);

      const words = text.split(" ");
      const motion = window.Motion.motion;

      return (
        <p
          ref={containerRef}
          className={className}
          style={{
            display: "flex",
            flexWrap: "wrap",
            justifyContent: "center",
            rowGap: "0.1em",
          }}
        >
          {words.map((word, i) => {
            const delay = (i * 100) / 1000;
            return (
              <motion.span
                key={i}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  isInView
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : {}
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: delay,
                }}
                style={{
                  display: "inline-block",
                  marginRight: "0.28em",
                }}
              >
                {word}
              </motion.span>
            );
          })}
        </p>
      );
    };
